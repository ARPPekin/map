<!doctype html>
<html lang="pl">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Atrakcje</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-title-key="attractionsTitle">

    <div class="shell">
      <section class="panel content">

          <a class="back-btn" href="index.html" data-i18n="back">← Powrót</a>

            <button class="lang-btn" type="button" data-lang="zh">中文</button>
          </div>
        </div>
        <h2 data-i18n="attractionsTitle">Atrakcje</h2>
        <div class="media-card">
          <img src="attractions-map.png" data-i18n-alt="imageAltAttractions" alt="Mapa atrakcji">
          <div class="media-caption" data-i18n="attractionsCaption">Mapa atrakcji / plan strefy</div>
        </div>
      </section>
    </div>

  <script src="app.js"></script>
